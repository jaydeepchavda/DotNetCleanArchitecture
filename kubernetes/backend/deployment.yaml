apiVersion: apps/v1
kind: Deployment

metadata:
  name: employeehub-backend
  labels:
    app: employeehub-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employeehub-backend

  template:
    metadata:
      labels:
        app: employeehub-backend

    spec:
      containers:
        - name: backend

          image: jaydeepchavda/employeehub-backend:v1

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 30
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /health
              port: 8080

            initialDelaySeconds: 10
            periodSeconds: 5